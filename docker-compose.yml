version: '3.8'

services:
  # Django Core Application
  app:
    build: .
    container_name: zero_bot_django
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
    volumes:
      - ./zero_bot:/app/zero_bot
      - bot_data:/data/bots
    depends_on:
      - redis
    networks:
      - zero_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching and sessions
  redis:
    image: redis:7.0-alpine
    container_name: zero_bot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - zero_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



volumes:
  redis_data:
    driver: local
  bot_data:
    driver: local

networks:
  zero_bot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16 