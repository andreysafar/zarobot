version: '3.8'

services:
  # ==========================================
  # CORE INFRASTRUCTURE
  # ==========================================
  
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zero_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zero_bot
      POSTGRES_USER: zero_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zero_bot_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - zero_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zero_bot"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cluster
  redis-master:
    image: redis:7.0-alpine
    container_name: zero_bot_redis_master
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      - redis_master_data:/data
    networks:
      - zero_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-slave:
    image: redis:7.0-alpine
    container_name: zero_bot_redis_slave
    restart: unless-stopped
    command: redis-server --slaveof redis-master 6379 --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    depends_on:
      - redis-master
    networks:
      - zero_bot_network

  # Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: zero_bot_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-zero_bot}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secure_pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"  # Management UI
    networks:
      - zero_bot_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  # ==========================================
  # CORE API & SERVICES
  # ==========================================

  # Core Django API
  core-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: zero_bot_core_api
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-False}
      - DATABASE_URL=postgresql://zero_bot:${POSTGRES_PASSWORD:-zero_bot_secure_pass}@postgres:5432/zero_bot
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis-master:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-zero_bot}:${RABBITMQ_PASSWORD:-rabbitmq_secure_pass}@rabbitmq:5672/
      - SECRET_KEY=${SECRET_KEY:-your_very_secret_key_here}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TON_API_KEY=${TON_API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    volumes:
      - ./:/app
      - bot_data:/data/bots
      - static_files:/app/staticfiles
    depends_on:
      - postgres
      - redis-master
      - rabbitmq
    networks:
      - zero_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Bot Factory Service
  bot-factory:
    build:
      context: .
      dockerfile: services/bot-factory/Dockerfile
    container_name: zero_bot_factory
    restart: unless-stopped
    environment:
      - CORE_API_URL=http://core-api:8000
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis-master:6379/1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - bot_configs:/app/bot_configs
    depends_on:
      - core-api
      - redis-master
    networks:
      - zero_bot_network

  # ==========================================
  # SPECIALIZED SERVICES
  # ==========================================

  # IA-Mother Bot (Marketplace + Exchange)
  ia-mother:
    build:
      context: .
      dockerfile: services/ia-mother/Dockerfile
    container_name: ia_mother_bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${IA_MOTHER_BOT_TOKEN}
      - CORE_API_URL=http://core-api:8000
      - TON_API_KEY=${TON_API_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis-master:6379/2
    volumes:
      - ia_mother_data:/app/data
    depends_on:
      - core-api
      - redis-master
    networks:
      - zero_bot_network

  # Langflow WebApp Service
  langflow-webapp:
    build:
      context: .
      dockerfile: services/langflow-webapp/Dockerfile
    container_name: zero_bot_langflow
    restart: unless-stopped
    environment:
      - CORE_API_URL=http://core-api:8000
      - TON_CONNECT_MANIFEST_URL=${TON_CONNECT_MANIFEST_URL}
      - WEBAPP_URL=${WEBAPP_URL}
    volumes:
      - langflow_data:/app/data
    depends_on:
      - core-api
    networks:
      - zero_bot_network
    ports:
      - "3000:3000"

  # TON Wallet Auth Service
  ton-auth:
    build:
      context: .
      dockerfile: services/ton-auth/Dockerfile
    container_name: zero_bot_ton_auth
    restart: unless-stopped
    environment:
      - TON_API_KEY=${TON_API_KEY}
      - CORE_API_URL=http://core-api:8000
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
    depends_on:
      - core-api
    networks:
      - zero_bot_network

  # Blockchain Bridge Service
  blockchain-bridge:
    build:
      context: .
      dockerfile: services/blockchain-bridge/Dockerfile
    container_name: zero_bot_bridge
    restart: unless-stopped
    environment:
      - TON_API_KEY=${TON_API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}
      - CORE_API_URL=http://core-api:8000
    volumes:
      - bridge_data:/app/data
    depends_on:
      - core-api
    networks:
      - zero_bot_network

  # Skill Registry Service
  skill-registry:
    build:
      context: .
      dockerfile: services/skill-registry/Dockerfile
    container_name: zero_bot_skill_registry
    restart: unless-stopped
    environment:
      - CORE_API_URL=http://core-api:8000
      - REDIS_URL=redis://redis-master:6379/3
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}
    depends_on:
      - redis-master
      - core-api
    networks:
      - zero_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # INFRASTRUCTURE SERVICES
  # ==========================================

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: zero_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/ssl:/etc/nginx/ssl
      - static_files:/var/www/static
    depends_on:
      - core-api
      - langflow-webapp
    networks:
      - zero_bot_network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: zero_bot_prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - zero_bot_network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: zero_bot_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_secure_pass}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - zero_bot_network

  # Log Management - ELK Stack (Elasticsearch)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: zero_bot_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - zero_bot_network

  # Log Management - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: zero_bot_logstash
    restart: unless-stopped
    volumes:
      - ./config/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - zero_bot_network

  # Log Management - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: zero_bot_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - zero_bot_network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_master_data:
    driver: local
  rabbitmq_data:
    driver: local
  bot_data:
    driver: local
  bot_configs:
    driver: local
  ia_mother_data:
    driver: local
  langflow_data:
    driver: local
  bridge_data:
    driver: local
  static_files:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  zero_bot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

# ==========================================
# DYNAMIC BOT CONTAINERS
# ==========================================
# Individual bot containers are created dynamically
# by the Bot Factory service using Docker API
# Template: zero_bot_instance_{bot_id}