events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upstream servers
    upstream core_api {
        server core-api:8000;
        # Add more instances for load balancing
        # server core-api-2:8000;
    }

    upstream bot_factory {
        server bot-factory:8001;
    }

    upstream ia_mother_health {
        server ia-mother:8002;
    }

    upstream langflow_webapp {
        server langflow-webapp:3000;
    }
    
    upstream skill_registry {
        server skill-registry:8003;
    }

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Static files
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /var/www/media/;
            expires 1y;
            add_header Cache-Control "public";
        }

        # Core API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://core_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Django Admin
        location /admin/ {
            limit_req zone=auth burst=5 nodelay;
            
            proxy_pass http://core_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health checks
        location /health/ {
            proxy_pass http://core_api;
            access_log off;
        }

        # Bot Factory API
        location /bot-factory/ {
            limit_req zone=api burst=10 nodelay;
            
            rewrite ^/bot-factory/(.*) /$1 break;
            proxy_pass http://bot_factory;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Langflow WebApp
        location /langflow/ {
            rewrite ^/langflow/(.*) /$1 break;
            proxy_pass http://langflow_webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # Skill Registry Service
        location /skill-registry/ {
            limit_req zone=api burst=15 nodelay;
            
            rewrite ^/skill-registry/(.*) /$1 break;
            proxy_pass http://skill_registry;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for blockchain operations
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # TON Connect manifest
        location /tonconnect-manifest.json {
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{
                "url": "https://your-domain.com",
                "name": "Zero Bot",
                "iconUrl": "https://your-domain.com/icon.png",
                "termsOfUseUrl": "https://your-domain.com/terms",
                "privacyPolicyUrl": "https://your-domain.com/privacy"
            }';
        }

        # Root redirect
        location / {
            return 301 /langflow/;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /var/www/html;
        }
    }

    # HTTPS server (for production)
    server {
        listen 443 ssl http2;
        server_name your-domain.com;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozTLS:10m;
        ssl_session_tickets off;

        # Modern configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Same configuration as HTTP server
        # ... (copy all location blocks from above)
    }

    # Monitoring endpoints
    server {
        listen 8080;
        server_name localhost;
        
        # Nginx status
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.30.0.0/16;  # Docker network
            deny all;
        }

        # Health check aggregator
        location /health/all {
            access_log off;
            
            # Check all services
            content_by_lua_block {
                local http = require "resty.http"
                local httpc = http.new()
                
                local services = {
                    {name = "core-api", url = "http://core-api:8000/health/"},
                    {name = "bot-factory", url = "http://bot-factory:8001/health"},
                    {name = "ia-mother", url = "http://ia-mother:8002/health"},
                    {name = "langflow", url = "http://langflow-webapp:3000/api/health"}
                }
                
                local results = {}
                for _, service in ipairs(services) do
                    local res, err = httpc:request_uri(service.url, {
                        method = "GET",
                        timeout = 5000
                    })
                    
                    results[service.name] = {
                        status = res and res.status == 200 and "healthy" or "unhealthy",
                        error = err
                    }
                end
                
                ngx.header["Content-Type"] = "application/json"
                ngx.say(require("cjson").encode({
                    status = "ok",
                    services = results,
                    timestamp = ngx.time()
                }))
            }
        }
    }
}